name: Android CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Fix Everything - Inject Structure, Dependencies & Manifest
      run: |
        # 1. Ensure Root Settings
        cat << 'EOF' > settings.gradle.kts
        pluginManagement {
            repositories { google(); mavenCentral(); gradlePluginPortal() }
        }
        dependencyResolutionManagement {
            repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
            repositories { google(); mavenCentral() }
        }
        rootProject.name = "Safeguard"
        include(":app")
        EOF

        # 2. Ensure Root Build Configuration
        cat << 'EOF' > build.gradle.kts
        plugins {
            id("com.android.application") version "8.2.2" apply false
            id("org.jetbrains.kotlin.android") version "1.9.22" apply false
        }
        EOF

        # 3. Enable AndroidX
        cat << 'EOF' > gradle.properties
        android.useAndroidX=true
        android.enableJetifier=true
        EOF

        # 4. Patch Manifest (Fixes missing icon/theme errors from earlier)
        sed -i 's/@mipmap\/ic_launcher/@android:drawable\/sym_def_app_icon/g' app/src/main/AndroidManifest.xml
        sed -i 's/@style\/Theme.AppCompat.DayNight.NoActionBar/@android:style\/Theme.DeviceDefault.NoActionBar/g' app/src/main/AndroidManifest.xml

        # 5. THE NUCLEAR FIX: Force-inject the missing dependencies
        # This appends the exact libraries the Kotlin compiler was crying about.
        cat << 'EOF' >> app/build.gradle.kts
        
        dependencies {
            implementation("androidx.camera:camera-view:1.3.1")
            implementation("androidx.lifecycle:lifecycle-service:2.6.2")
        }
        EOF

        # 6. Initialize Modern Gradle
        wget -q https://services.gradle.org/distributions/gradle-8.5-bin.zip
        unzip -q gradle-8.5-bin.zip
        export PATH=$PWD/gradle-8.5/bin:$PATH
        gradle wrapper --gradle-version 8.5
        chmod +x gradlew

    - name: Build Debug APK
      run: ./gradlew assembleDebug
      
    - name: Upload Safeguard APK
      uses: actions/upload-artifact@v4
      with:
        name: safeguard-debug-apk
        path: app/build/outputs/apk/debug/app-debug.apk
        if-no-files-found: error
        overwrite: true

