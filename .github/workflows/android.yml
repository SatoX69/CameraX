name: Android CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Generate Root Structure, Wrapper & Patch Manifest
      run: |
        # 1. Create the missing root settings.gradle.kts file first
        cat << 'EOF' > settings.gradle.kts
        pluginManagement {
            repositories {
                google()
                mavenCentral()
                gradlePluginPortal()
            }
        }
        dependencyResolutionManagement {
            repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
            repositories {
                google()
                mavenCentral()
            }
        }
        rootProject.name = "Safeguard"
        include(":app")
        EOF

        # 2. Create the missing root build.gradle.kts file
        cat << 'EOF' > build.gradle.kts
        plugins {
            id("com.android.application") version "8.2.2" apply false
            id("org.jetbrains.kotlin.android") version "1.9.22" apply false
        }
        EOF

        # 3. Create gradle.properties to enable AndroidX
        cat << 'EOF' > gradle.properties
        android.useAndroidX=true
        android.enableJetifier=true
        EOF

        # 4. PATCH THE MANIFEST: Swap missing custom icon/theme for default Android system assets
        sed -i 's/@mipmap\/ic_launcher/@android:drawable\/sym_def_app_icon/g' app/src/main/AndroidManifest.xml
        sed -i 's/@style\/Theme.AppCompat.DayNight.NoActionBar/@android:style\/Theme.DeviceDefault.NoActionBar/g' app/src/main/AndroidManifest.xml

        # 5. Download standalone Gradle 8.5 to initialize the environment
        wget -q https://services.gradle.org/distributions/gradle-8.5-bin.zip
        unzip -q gradle-8.5-bin.zip
        export PATH=$PWD/gradle-8.5/bin:$PATH
        
        # 6. Generate local wrapper assets safely
        gradle wrapper --gradle-version 8.5
        chmod +x gradlew

    - name: Build Debug APK
      run: ./gradlew assembleDebug
      
    - name: Upload Safeguard APK
      uses: actions/upload-artifact@v4
      with:
        name: safeguard-debug-apk
        path: app/build/outputs/apk/debug/app-debug.apk
        if-no-files-found: error
        overwrite: true

